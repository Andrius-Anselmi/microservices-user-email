spring:
  application:
    name: user

  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5435/ms-user-ms}
    username: ${USER_DB_USERNAME:postgres-user}
    password: ${USER_DB_PASSWORD:postgres-password}
    driver-class-name: ${USER_DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${USER_RABBIT_HOST:chameleon.lmq.cloudamqp.com}
    username: ${USER_RABBIT_USERNAME:qknjvqyn}
    password: ${USER_RABBIT_PASSWORD:GJ3aHWASwX1FreWIkxuYJBjUsJmuSzo4}
    virtual-host: ${USER_RABBIT_VHOST:qknjvqyn}

server:
  port: ${USER_SERVER_PORT:8081}


